<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Servicios</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Matemasie&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1 class="titulo">Pedreria Joyita <span>Materiales textiles y servicios personalizados.</span></h1>
    </header>
    
    <div class="nav-bg">
        <nav class="navegacion-principal contenedor">
            <a href="index.html" class="nav-link" id="inicio-link">Inicio</a>
            <a href="catalogo.html" class="nav-link" id="catalogo-link">Catálogo</a>
            <a href="carrito.html" class="nav-link" id="carrito-link">Carrito</a>
            <a href="historial.html" class="nav-link" id="historial-link">Historial de pedidos</a>
        </nav>
    </div>

    <main class="contenedor sombra">
        <h2>Carrito de Servicios</h2>
        <div id="carrito-items" class="productos"></div>
        <h3 id="total-carrito">Total: $0.00</h3>
        <button id="boton-pagar" class="boton">Pagar</button>

        <section id="formulario-pago" style="display: none;">
            <h2>Formulario de Pago</h2>
            <form id="form-pago" class="formulario">
                <fieldset>
                    <legend>Datos del Cliente</legend>
                    <div class="campo">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" name="nombre" class="input-text" placeholder="Tu nombre" required>
                    </div>
                    <div class="campo">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" name="apellido" class="input-text" placeholder="Tu apellido" required>
                    </div>
                    <div class="campo">
                        <label for="correo">Correo Electrónico</label>
                        <input type="email" id="correo" name="correo" class="input-text" placeholder="Tu correo" required>
                    </div>
                    <div class="campo">
                        <label for="celular">Número de Celular</label>
                        <input type="tel" id="celular" name="celular" class="input-text" placeholder="Tu número de celular" required>
                    </div>
                </fieldset>
                
                <fieldset>
                    <legend>Datos de la Tarjeta</legend>
                    <div class="campo">
                        <label for="tarjeta">Número de Tarjeta</label>
                        <input type="text" id="tarjeta" name="tarjeta" class="input-text" placeholder="0000 0000 0000 0000" required>
                    </div>
                    <div class="campo">
                        <label for="fecha-vencimiento">Fecha de Vencimiento</label>
                        <input type="text" id="fecha-vencimiento" name="fecha-vencimiento" class="input-text" placeholder="MM/AA" required>
                    </div>
                    <div class="campo">
                        <label for="titular">Titular de la Tarjeta</label>
                        <input type="text" id="titular" name="titular" class="input-text" placeholder="Nombre del titular" required>
                    </div>
                    <div class="campo">
                        <label for="cvv">CVV</label>
                        <input type="text" id="cvv" name="cvv" class="input-text" placeholder="123" required>
                    </div>
                </fieldset>
                
                <button type="submit" class="boton">Confirmar Pago</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>Todos los derechos reservados.</p>
    </footer>

    <script>
        const carrito = JSON.parse(localStorage.getItem("carrito")) || [];
        const carritoItemsContainer = document.getElementById("carrito-items");
        const totalCarrito = document.getElementById("total-carrito");
        const botonPagar = document.getElementById("boton-pagar");
        const formularioPago = document.getElementById("formulario-pago");
        const formPago = document.getElementById("form-pago");

        function mostrarCarrito() {
            carritoItemsContainer.innerHTML = '';
            let total = 0;
            carrito.forEach((item, index) => {
                const itemHTML = `
                    <div class="producto">
                        <h3>${item.nombre}</h3>
                        <p>Cantidad: ${item.cantidad}</p>
                        <p>Precio: $${item.precio}</p>
                        <p>Subtotal: $${(item.cantidad * item.precio).toFixed(2)}</p>
                        <button onclick="eliminarDelCarrito(${index})" class="boton-quitar">Quitar</button>
                    </div>
                `;
                total += item.cantidad * item.precio;
                carritoItemsContainer.insertAdjacentHTML('beforeend', itemHTML);
            });
            totalCarrito.textContent = `Total: $${total.toFixed(2)}`;
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            localStorage.setItem("carrito", JSON.stringify(carrito));
            mostrarCarrito();
        }

        function validarFormulario() {
            const inputs = formPago.querySelectorAll("input[required]");
            let formValido = true;
            inputs.forEach(input => {
                if (!input.value) {
                    formValido = false;
                    input.style.borderColor = "red";
                    input.addEventListener("input", () => input.style.borderColor = "");
                }
            });
            return formValido;
        }

        botonPagar.addEventListener("click", () => {
            formularioPago.style.display = "block";
        });

        formPago.addEventListener("submit", (event) => {
            event.preventDefault();
            if (validarFormulario()) {
                // Guardar el pedido en el historial
                const historial = JSON.parse(localStorage.getItem("historial")) || [];
                const nuevoPedido = {
                    fecha: new Date().toLocaleString(),
                    items: [...carrito],
                    total: carrito.reduce((sum, item) => sum + item.precio * item.cantidad, 0),
                };
                historial.push(nuevoPedido);
                localStorage.setItem("historial", JSON.stringify(historial));

                // Limpiar el carrito y redirigir
                alert("Pago realizado con éxito. Pedido añadido al historial.");
                localStorage.removeItem("carrito");
                window.location.href = "index.html";
            } else {
                alert("Por favor, completa todos los campos requeridos.");
            }
        });

        mostrarCarrito();
    </script>
</body>
</html>
